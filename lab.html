<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZT Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg:        #0e0a14;
    --surface:   #17111f;
    --border:    #2e1f3e;
    --accent:    #7c4dbb;
    --gold:      #c8a96e;
    --gold-dim:  #7a6240;
    --text:      #d4c9e8;
    --text-dim:  #7a6e8a;
    --red:       #c04a4a;
    --green:     #4a8c5c;
    --mono:      'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 1.5rem;
  }

  #login-screen h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.25em;
  }

  #login-screen p {
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.9rem;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* ── LAYOUT ── */
  #app {
    display: none;
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem;
    gap: 1.5rem;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.75rem;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 0.2em;
  }

  header span {
    color: var(--text-dim);
    font-size: 0.8rem;
    font-style: italic;
  }

  /* ── FORM ── */
  .question-area {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .row { display: flex; gap: 0.75rem; align-items: flex-end; }

  label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.3rem;
  }

  input[type="text"],
  input[type="password"],
  textarea,
  input[type="number"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IM Fell English', serif;
    font-size: 15px;
    padding: 0.6rem 0.8rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus { border-color: var(--accent); }

  textarea { resize: vertical; min-height: 60px; }

  .coord-row { display: flex; gap: 0.5rem; }
  .coord-row > div { flex: 1; }

  button {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0.7rem 1.5rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s;
    white-space: nowrap;
  }

  button:hover { background: #9060d0; }
  button:disabled { background: var(--border); cursor: not-allowed; }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  button.secondary:hover { border-color: var(--accent); color: var(--text); }

  /* ── OUTPUT ── */
  #output-section { display: none; flex-direction: column; gap: 1rem; }

  .reading-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem 1.75rem;
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.8;
  }

  /* ── CHART DATA PANEL ── */
  .chart-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    user-select: none;
    color: var(--text-dim);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 0;
    border-top: 1px solid var(--border);
  }

  .chart-toggle:hover { color: var(--gold); }

  .toggle-icon { transition: transform 0.2s; }
  .chart-toggle.open .toggle-icon { transform: rotate(90deg); }

  #chart-panel {
    display: none;
    background: #0b0810;
    border: 1px solid var(--border);
    padding: 1.25rem;
    font-family: var(--mono);
    font-size: 12px;
    overflow-x: auto;
  }

  #chart-panel.visible { display: block; }

  .chart-section { margin-bottom: 1.25rem; }
  .chart-section:last-child { margin-bottom: 0; }

  .section-title {
    color: var(--gold-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: 0.7rem;
    margin-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.3rem;
  }

  table { border-collapse: collapse; width: 100%; }
  th {
    text-align: left;
    color: var(--text-dim);
    font-weight: 500;
    padding: 0.2rem 0.6rem;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 0.2rem 0.6rem; color: var(--text); }
  tr:hover td { background: rgba(124, 77, 187, 0.08); }

  .dig-domicile { color: #6ab04c; }
  .dig-exaltation { color: #a8d8a8; }
  .dig-detriment { color: var(--red); }
  .dig-fall { color: #e67e50; }
  .dig-peregrine { color: var(--text-dim); }
  .retro { color: var(--red); }
  .malefic-star { color: var(--red); }
  .benefic-star { color: var(--gold); }
  .voc-badge {
    background: var(--red);
    color: #fff;
    padding: 0.1rem 0.5rem;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
  }

  /* ── HISTORY ── */
  #history-section { border-top: 1px solid var(--border); padding-top: 1rem; }

  .hist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .hist-header h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .hist-list { display: flex; flex-direction: column; gap: 0.4rem; }

  .hist-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.6rem 0.8rem;
    cursor: pointer;
    display: flex;
    gap: 0.75rem;
    align-items: baseline;
  }

  .hist-item:hover { border-color: var(--accent); }

  .hist-date { color: var(--text-dim); font-size: 0.75rem; font-family: var(--mono); white-space: nowrap; }
  .hist-q { color: var(--text); font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  .hist-rating { font-family: var(--mono); font-size: 0.75rem; }
  .r1 { color: var(--red); }
  .r2 { color: #e67e50; }
  .r3 { color: var(--gold); }
  .r4 { color: var(--green); }
  .r5 { color: #6ab04c; }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FEEDBACK ROW ── */
  .feedback-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .rating-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    letter-spacing: 0;
    text-transform: none;
    transition: all 0.15s;
  }

  .rating-btn:hover, .rating-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(200,169,110,0.08); }

  .note-input { flex: 1; min-width: 200px; }

  /* ── MISC ── */
  .error-msg { color: var(--red); font-size: 0.85rem; font-style: italic; padding: 0.5rem 0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>ZUHAL TEYZE — LAB</h1>
  <p>Şifre ile giriş yap.</p>
  <div class="login-box">
    <div>
      <label>Şifre</label>
      <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button onclick="doLogin()">Giriş</button>
    <div id="login-error" class="error-msg" style="display:none"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>ZT LAB</h1>
    <span id="header-time"></span>
  </header>

  <!-- SORU FORMU -->
  <div class="question-area">
    <div>
      <label>Soru</label>
      <input type="text" id="q-input" placeholder="Soruyu buraya gir…" onkeydown="if(event.key==='Enter') submitQuestion()">
    </div>
    <div class="coord-row">
      <div>
        <label>Enlem</label>
        <input type="number" id="lat-input" value="41.64" step="0.01">
      </div>
      <div>
        <label>Boylam</label>
        <input type="number" id="lon-input" value="41.63" step="0.01">
      </div>
      <div style="display:flex;align-items:flex-end">
        <button id="submit-btn" onclick="submitQuestion()">Sor</button>
      </div>
    </div>
  </div>

  <!-- OUTPUT -->
  <div id="output-section">
    <div id="reading-box" class="reading-box"></div>

    <!-- Feedback -->
    <div class="feedback-row" id="feedback-row" style="display:none">
      <span style="color:var(--text-dim);font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase">Puan:</span>
      <button class="rating-btn" onclick="setRating(1)">1 ✗</button>
      <button class="rating-btn" onclick="setRating(2)">2 △</button>
      <button class="rating-btn" onclick="setRating(3)">3 ○</button>
      <button class="rating-btn" onclick="setRating(4)">4 ◉</button>
      <button class="rating-btn" onclick="setRating(5)">5 ★</button>
      <input type="text" class="note-input" id="note-input" placeholder="not ekle…" style="max-width:250px">
      <button class="secondary" onclick="saveFeedback()">Kaydet</button>
    </div>

    <!-- Chart Toggle -->
    <div class="chart-toggle" id="chart-toggle" onclick="toggleChart()" style="display:none">
      <span class="toggle-icon">▶</span>
      <span>Ham Harita Verisi</span>
      <span id="voc-badge-inline"></span>
    </div>
    <div id="chart-panel"></div>
  </div>

  <!-- HISTORY -->
  <div id="history-section" style="display:none">
    <div class="hist-header">
      <h3>Geçmiş</h3>
      <button class="secondary" onclick="loadHistory()" style="padding:0.3rem 0.8rem;font-size:0.7rem">Yenile</button>
    </div>
    <div class="hist-list" id="hist-list"></div>
  </div>
</div>

<script>
let currentEntryId = null;
let currentRating  = 0;
let chartData      = null;

// ── AUTH ──────────────────────────────────

async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/lab/auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    });
    const d = await res.json();
    if (!res.ok) { err.textContent = d.error || 'Hata'; err.style.display = 'block'; return; }
    showApp();
  } catch(e) { err.textContent = 'Sunucu hatası'; err.style.display = 'block'; }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  tickClock();
  setInterval(tickClock, 1000);
  loadHistory();
}

function tickClock() {
  const now = new Date();
  const s = now.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('header-time').textContent = s;
}

// ── SUBMIT ───────────────────────────────

async function submitQuestion() {
  const q   = document.getElementById('q-input').value.trim();
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lon = parseFloat(document.getElementById('lon-input').value);
  if (!q) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const outputSec   = document.getElementById('output-section');
  const readingBox  = document.getElementById('reading-box');
  const feedbackRow = document.getElementById('feedback-row');
  const chartToggle = document.getElementById('chart-toggle');

  outputSec.style.display   = 'flex';
  readingBox.textContent     = 'Harita hesaplanıyor…';
  feedbackRow.style.display  = 'none';
  chartToggle.style.display  = 'none';
  document.getElementById('chart-panel').classList.remove('visible');
  chartToggle.classList.remove('open');
  currentEntryId = null;
  currentRating  = 0;
  chartData      = null;
  document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('active'));

  try {
    const res = await fetch('/api/lab/reading', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: q, lat, lon})
    });
    const d = await res.json();
    if (!res.ok || !d.success) {
      readingBox.textContent = '⚠ ' + (d.error || 'Hata oluştu.');
    } else {
      readingBox.textContent = d.output;
      currentEntryId = d.id;
      feedbackRow.style.display = 'flex';

      if (d.chart_json && Object.keys(d.chart_json).length > 0) {
        chartData = d.chart_json;
        renderChartPanel(chartData);
        chartToggle.style.display  = 'flex';
        const vocBadge = document.getElementById('voc-badge-inline');
        const isVoc = checkVoc(chartData);
        vocBadge.innerHTML = isVoc ? '<span class="voc-badge">VOC</span>' : '';
      }

      loadHistory();
    }
  } catch(e) {
    readingBox.textContent = '⚠ Sunucu hatası: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = 'Sor';
}

// ── CHART PANEL ──────────────────────────

function toggleChart() {
  const panel  = document.getElementById('chart-panel');
  const toggle = document.getElementById('chart-toggle');
  panel.classList.toggle('visible');
  toggle.classList.toggle('open');
}

function checkVoc(cj) {
  // Basit kontrol: fixed_stars veya prompt üzerinden — engine VOC bilgisi json'da yok,
  // ama "voc" anahtar kelimesi çıktıda aranabilir. Burada placeholder.
  return false;
}

function dignityClass(d) {
  if (!d) return '';
  if (d.includes('domicile')) return 'dig-domicile';
  if (d.includes('exalt'))    return 'dig-exaltation';
  if (d.includes('detriment'))return 'dig-detriment';
  if (d.includes('fall'))     return 'dig-fall';
  return 'dig-peregrine';
}

function renderChartPanel(cj) {
  const panel = document.getElementById('chart-panel');

  // ── GEZEGEN TABLOSU
  let html = '';
  html += `<div class="chart-section">`;
  html += `<div class="section-title">Gezegen Pozisyonları — ${cj.datetime ? cj.datetime.replace('T',' ').slice(0,16) : ''} | ${cj.is_daytime ? 'Gündüz' : 'Gece'}</div>`;
  html += `<table><thead><tr>
    <th>Gezegen</th><th>Derece</th><th>Burç</th><th>Ev</th><th>Dignity</th><th>Puan</th><th>Hız</th>
  </tr></thead><tbody>`;

  const planets = cj.planets || {};
  for (const [key, p] of Object.entries(planets)) {
    const retro = p.retrograde ? '<span class="retro"> ℞</span>' : '';
    const dc = dignityClass(p.essential_dignity || '');
    const deg = typeof p.sign_degree === 'number' ? p.sign_degree.toFixed(1) : '—';
    const spd = typeof p.speed === 'number' ? (p.speed > 0 ? '+' : '') + p.speed.toFixed(3) : '—';
    html += `<tr>
      <td>${p.name || key}</td>
      <td>${deg}°</td>
      <td>${p.sign || '—'}</td>
      <td>${p.house || '—'}</td>
      <td class="${dc}">${p.essential_dignity || 'peregrine'}</td>
      <td>${p.dignity_score ?? '—'}</td>
      <td>${spd}${retro}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  // ── ASPECTLERs
  const aspects = cj.aspects || [];
  if (aspects.length > 0) {
    html += `<div class="chart-section">`;
    html += `<div class="section-title">Aspectler</div>`;
    html += `<table><thead><tr><th>A</th><th>Açı</th><th>B</th><th>Orb</th><th>Durum</th></tr></thead><tbody>`;
    for (const a of aspects) {
      const status = a.applying ? '<span style="color:var(--green)">→ yaklaşıyor</span>'
                                : '<span style="color:var(--text-dim)">← uzaklaşıyor</span>';
      html += `<tr>
        <td>${a.planet_a || '?'}</td>
        <td>${a.aspect || '?'}</td>
        <td>${a.planet_b || '?'}</td>
        <td>${typeof a.orb === 'number' ? a.orb.toFixed(2) + '°' : '—'}</td>
        <td>${status}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // ── SABİT YILDIZLAR
  const stars = cj.fixed_stars || [];
  if (stars.length > 0) {
    html += `<div class="chart-section">`;
    html += `<div class="section-title">Aktif Sabit Yıldızlar</div>`;
    html += `<table><thead><tr><th>Nokta</th><th>Yıldız</th><th>Orb</th><th>Doğa</th></tr></thead><tbody>`;
    for (const s of stars) {
      const cls = s.malefic ? 'malefic-star' : 'benefic-star';
      html += `<tr>
        <td>${s.point || '?'}</td>
        <td class="${cls}">${s.star_tr || s.star_key}</td>
        <td>${s.orb}°</td>
        <td>${s.nature || '—'}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // ── EV BAŞLANGIÇLARI
  const houses = cj.houses || [];
  if (houses.length > 0) {
    html += `<div class="chart-section">`;
    html += `<div class="section-title">Ev Başlangıçları (Regiomontanus)</div>`;
    html += `<table><thead><tr><th>Ev</th><th>Burç</th><th>Derece</th></tr></thead><tbody>`;
    houses.forEach((h, i) => {
      const deg = typeof h.degree === 'number' ? h.degree.toFixed(1) : '—';
      html += `<tr><td>${i+1}</td><td>${h.sign || '—'}</td><td>${deg}°</td></tr>`;
    });
    html += `</tbody></table></div>`;
  }

  panel.innerHTML = html;
}

// ── FEEDBACK ─────────────────────────────

function setRating(n) {
  currentRating = n;
  document.querySelectorAll('.rating-btn').forEach((b, i) => {
    b.classList.toggle('active', i + 1 === n);
  });
}

async function saveFeedback() {
  if (!currentEntryId) return;
  const note = document.getElementById('note-input').value;
  await fetch(`/api/lab/feedback/${currentEntryId}`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({rating: currentRating, tags: [], note})
  });
  loadHistory();
}

// ── HISTORY ──────────────────────────────

async function loadHistory() {
  try {
    const res = await fetch('/api/lab/history');
    if (!res.ok) return;
    const rows = await res.json();
    const list = document.getElementById('hist-list');
    const sec  = document.getElementById('history-section');

    if (!rows.length) { sec.style.display = 'none'; return; }

    sec.style.display = 'block';
    list.innerHTML = rows.slice(0, 30).map(r => {
      const ratingLabel = r.rating ? `<span class="hist-rating r${r.rating}">${r.rating}★</span>` : '';
      return `<div class="hist-item" onclick="showHistItem(${r.id})">
        <span class="hist-date">${r.date}</span>
        <span class="hist-q">${escHtml(r.question)}</span>
        ${ratingLabel}
      </div>`;
    }).join('');
  } catch(e) {}
}

async function showHistItem(id) {
  try {
    const res = await fetch('/api/lab/history');
    const rows = await res.json();
    const r = rows.find(x => x.id === id);
    if (!r) return;
    document.getElementById('reading-box').textContent = r.output;
    document.getElementById('output-section').style.display = 'flex';
    document.getElementById('feedback-row').style.display = 'flex';
    document.getElementById('chart-toggle').style.display = 'none';
    currentEntryId = r.id;
    currentRating  = r.rating || 0;
    document.getElementById('note-input').value = r.note || '';
    document.querySelectorAll('.rating-btn').forEach((b, i) => {
      b.classList.toggle('active', i + 1 === currentRating);
    });
    window.scrollTo({top: 0, behavior: 'smooth'});
  } catch(e) {}
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── STARTUP ──────────────────────────────

// Cookie kontrol — zaten giriş yapıldıysa direkt aç
(function() {
  if (document.cookie.includes('zt_lab=')) {
    showApp();
  }
})();
</script>
</body>
</html>
